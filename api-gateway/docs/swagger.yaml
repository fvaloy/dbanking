definitions:
  handler.CreatePaymentRequest:
    properties:
      amount:
        type: integer
      currency:
        type: string
      user_id:
        type: string
    required:
    - amount
    - currency
    - user_id
    type: object
  handler.StressTestRequest:
    properties:
      concurrency:
        type: integer
      duration_seconds:
        type: integer
    required:
    - duration_seconds
    type: object
  handler.StressTestResponse:
    properties:
      concurrency:
        type: integer
      duration_seconds:
        type: integer
      failures:
        type: integer
      successes:
        type: integer
      total_requests:
        type: integer
    type: object
info:
  contact: {}
paths:
  /payments:
    get:
      consumes:
      - application/json
      description: List payments filtered by payment status
      parameters:
      - description: Payment status
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List payments by status
      tags:
      - payments
    post:
      consumes:
      - application/json
      description: Create a payment in the Payment microservice
      parameters:
      - description: Create payment request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreatePaymentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new payment
      tags:
      - payments
  /payments/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve payment details by payment ID
      parameters:
      - description: Payment ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a payment by ID
      tags:
      - payments
  /stress-test:
    post:
      consumes:
      - application/json
      description: Execute concurrent CreatePayment calls for load testing
      parameters:
      - description: Stress test request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.StressTestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.StressTestResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Run a payment stress test
      tags:
      - payments
swagger: "2.0"
